plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.kotlin.compose)
    alias(libs.plugins.google.services)
    alias(libs.plugins.firebase.crashlytics.gradle)
    alias(libs.plugins.ksp)
}

android {

    namespace 'co.candyhouse.app'

    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        release {
            def passStore = System.getenv("storePassword")
            def passKey = System.getenv("keyPassword")
            def ssmKeyAlias = System.getenv("keyAlias")
            storeFile file(rootProject.file('Sesame.jks').getCanonicalFile())
            storePassword "$passStore"
            keyPassword "$passKey"
            keyAlias "$ssmKeyAlias"
        }
    }

    defaultConfig {
        def getGitHash = { ->
            def stdout = new ByteArrayOutputStream()
            exec {
                commandLine 'git', 'rev-parse', '--short=9', 'HEAD'
                standardOutput = stdout
            }
            return stdout.toString().trim()
        }
        applicationId 'co.candyhouse.sesame2'
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 266
        versionName '3.0.266'
        vectorDrawables.useSupportLibrary = true
        buildConfigField("String", "GIT_HASH", "\"${getGitHash}\"")
        ndk {
            debugSymbolLevel 'FULL'
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
            // 添加调试符号，debug is true
            debuggable true
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            buildConfigField("String", "ch_user_server", "\"https://example.mobile.com/dev\"")
            buildConfigField("String", "testname", "\"test\"")
            firebaseCrashlytics {
                mappingFileUploadEnabled = false
                nativeSymbolUploadEnabled = false
                unstrippedNativeLibsDir = null
                strippedNativeLibsDir = null
            }
        }

        release {
            minifyEnabled true
            shrinkResources true
            // 添加调试符号，release is false
            debuggable false
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            buildConfigField("String", "ch_user_server", "\"https://example.mobile.com/prod\"")
            buildConfigField("String", "testname", "\"test\"")
            signingConfig signingConfigs.release
            ndk {
                debugSymbolLevel 'FULL'
            }
            firebaseCrashlytics {
                mappingFileUploadEnabled true
            }
        }
    }

    // CI环境中重写versionCode
    applicationVariants.configureEach { variant ->
        if (variant.buildType.name == 'ci') {
            variant.outputs.configureEach { output ->
                // 检查是否在 CI 环境中
                if (System.getenv("CI") == "true") {
                    output.versionCodeOverride = Integer.parseInt(System.getenv("VERSION_CODE"))
                    println "设置 CI 版本号: ${output.versionCodeOverride}"
                }
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildFeatures {
        viewBinding true
        buildConfig true
        compose true
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

}

